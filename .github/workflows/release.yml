name: Automatic Release
on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Zip module
        run: zip -r module.zip *
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: module.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}